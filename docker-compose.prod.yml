services:
  postgres:
    image: postgres:16-alpine
    container_name: daybook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daybook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-daybook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daybook} -d ${POSTGRES_DB:-daybook}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daybook-net

  app:
    image: ghcr.io/${GITHUB_OWNER:?GITHUB_OWNER is required}/daybook:latest
    container_name: daybook-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-daybook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-daybook}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@daybook.local}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    # No ports exposed to host — Caddy proxies internally
    networks:
      - daybook-net

  mcp:
    image: ghcr.io/${GITHUB_OWNER}/daybook-mcp:latest
    container_name: daybook-mcp
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DAYBOOK_API_URL: http://app:3000
      DAYBOOK_API_KEY: ${MCP_API_KEY:-}
      PORT: 3001
    # No ports exposed to host — Caddy proxies internally
    networks:
      - daybook-net

  caddy:
    image: caddy:2-alpine
    container_name: daybook-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - daybook-net
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  daybook-net:
    driver: bridge
