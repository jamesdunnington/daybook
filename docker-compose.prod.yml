services:
  postgres:
    image: postgres:16-alpine
    container_name: daybook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DAYBOOK_DB_USER:-daybook}
      POSTGRES_PASSWORD: ${DAYBOOK_DB_PASSWORD:?DAYBOOK_DB_PASSWORD is required}
      POSTGRES_DB: ${DAYBOOK_DB_NAME:-daybook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAYBOOK_DB_USER:-daybook} -d ${DAYBOOK_DB_NAME:-daybook}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daybook-net         # internal only — not exposed to Caddy

  app:
    image: ghcr.io/${GITHUB_OWNER:?GITHUB_OWNER is required}/daybook:latest
    container_name: daybook-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DAYBOOK_DB_USER:-daybook}:${DAYBOOK_DB_PASSWORD}@postgres:5432/${DAYBOOK_DB_NAME:-daybook}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@daybook.local}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    networks:
      - daybook-net         # reaches postgres
      - postiz-network      # Caddy reaches this container

  mcp:
    image: ghcr.io/${GITHUB_OWNER}/daybook-mcp:latest
    container_name: daybook-mcp
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DAYBOOK_API_URL: http://daybook-app:3000
      DAYBOOK_API_KEY: ${MCP_API_KEY:-}
      PORT: 3001
    networks:
      - postiz-network      # reaches daybook-app + Caddy reaches this container

volumes:
  postgres_data:
  uploads_data:

networks:
  daybook-net:
    driver: bridge
  postiz-network:
    external: true          # already created by the n8n stack
